server:
  port: 9001
spring:
  datasource:
    url: jdbc:h2:mem:fileuploaddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2
  servlet:
    multipart:
      max-file-size: 1000MB
      max-request-size: 2000MB
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    condition-rpc:
      exchange: condition.rpc.exchange
      request-queue: condition.rpc.request.queue
      ttl-ms: 60000